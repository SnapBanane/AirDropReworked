name: "Release Build"

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-latest"
            args: "--target universal-apple-darwin"
          - platform: "windows-latest"
            args: ""
          - platform: "ubuntu-22.04"
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev libayatana-appindicator3-dev librsvg2-dev patchelf libsoup-3.0-dev libjavascriptcoregtk-4.1-dev libwebkit2gtk-4.1-dev

      - name: setup python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: build python sidecar (windows + linux)
        if: matrix.platform != 'macos-latest'
        run: |
          pip install fastapi uvicorn requests psutil zeroconf pyinstaller httpx python-multipart
          python build_tools/build_sidecar.py

      - name: build python sidecar (macos)
        if: matrix.platform == 'macos-latest'
        run: |
          pip install fastapi uvicorn requests psutil zeroconf pyinstaller httpx python-multipart
          python build_tools/build_sidecar.py
          # PyInstaller cannot cross-compile from arm64 to x86_64.
          # Copy the arm64 binary under the universal name Tauri expects.
          # On Intel Macs it runs under Rosetta 2 - fine for v0.1.0.
          cp src-tauri/binaries/adrw-engine-aarch64-apple-darwin src-tauri/binaries/adrw-engine-x86_64-apple-darwin
          cp src-tauri/binaries/adrw-engine-aarch64-apple-darwin src-tauri/binaries/adrw-engine-universal-apple-darwin

      - name: install frontend dependencies
        run: npm install

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: app-v0.1.2
          releaseName: "ADRW v0.1.2"
          releaseBody: "Automated build of ADRW v0.1.1 by GitHub Actions. Developed by Julius Gerhardus"
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}