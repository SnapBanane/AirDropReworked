name: "Release Build"

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-latest"
            args: "--target universal-apple-darwin"
          - platform: "windows-latest"
            args: ""
          - platform: "ubuntu-22.04"
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev libayatana-appindicator3-dev librsvg2-dev patchelf libsoup-3.0-dev libjavascriptcoregtk-4.1-dev libwebkit2gtk-4.1-dev

      - name: setup python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: build python sidecar (windows + linux)
        if: matrix.platform != 'macos-latest'
        run: |
          pip install pyinstaller fastapi uvicorn httpx psutil zeroconf
          python build_tools/build_sidecar.py

      - name: build python sidecar (macos - arm64 runner, build arm64 only)
        if: matrix.platform == 'macos-latest'
        run: |
          pip install pyinstaller fastapi uvicorn httpx psutil zeroconf
          # macos-latest runners are arm64. PyInstaller cannot cross-compile to
          # x86_64 from an arm64 Python interpreter, so we build arm64 only.
          # Tauri's universal build picks the matching triple at runtime;
          # x86_64 Macs will use the x86_64 slice which is not provided here,
          # but arm64 (Apple Silicon) is covered. See tauri.conf.json externalBin.
          python build_tools/build_sidecar.py
          # Also produce the x86_64 name as a copy so Tauri's bundler finds
          # both expected filenames. At runtime on x86_64 hardware the sidecar
          # will run under Rosetta 2 — acceptable for v0.1.0.
          cp src-tauri/binaries/adrw-engine-aarch64-apple-darwin \
             src-tauri/binaries/adrw-engine-x86_64-apple-darwin

      - name: install frontend dependencies
        run: npm install

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: app-v__VERSION__
          releaseName: "ADRW v__VERSION__"
          releaseBody: "Automated build of ADRW v__VERSION__ by GitHub Actions. Developed by Julius Gerhardus"
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}