<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AirDropReworked</title>

    <style>
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #0d1117;
            color: #c9d1d9;
        }

        .banner {
            width: 100%;
            padding: 80px 20px;
            background: linear-gradient(135deg, #0d1117 0%, #161b22 100%);
            border-bottom: 1px solid #30363d;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        h1 {
            font-size: 48px;
            margin: 0;
            color: #ffffff;
            font-weight: 600;
            letter-spacing: -0.5px;
        }

        .accent {
            color: #58a6ff;
        }

        .subtitle {
            margin-top: 16px;
            font-size: 20px;
            color: #8b949e;
        }

        .divider {
            margin: 32px 0;
            height: 1px;
            background: #30363d;
        }

        .platforms {
            font-size: 16px;
            color: #8b949e;
            letter-spacing: 0.5px;
        }

        .platforms span {
            margin-right: 16px;
        }

        .tagline {
            margin-top: 24px;
            font-size: 18px;
            color: #c9d1d9;
        }
    </style>
</head>

<body>

<div class="banner">
    <div class="container">
        <h1>
            AirDrop<span class="accent">Reworked</span>
        </h1>

        <p class="subtitle">
            Cross-platform file sharing, redefined.
        </p>

        <div class="divider"></div>

        <div class="platforms">
            <span>Windows</span>
            <span>Apple</span>
            <span>Android</span>
            <span>Linux (coming soon)</span>
        </div>

        <p class="tagline">
            Fast. Private. Seamless.
        </p>
    </div>
</div>

</body>
</html>
